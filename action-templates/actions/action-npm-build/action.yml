name: "Npm build"
description: "Executes an npm build and uploads the generated artifact to npm"

inputs:
  node-version:
    description: "node version"
    required: false
  node-version-file:
    description: "File containing the version Spec of the version to use."
    required: false
    default: package.json
  app-path:
    description: "Path to package.json file"
    required: true
  run-lint:
    description: "Controls the execution of the 'npm run lint' script"
    required: false
    default: "true"
  run-test:
    description: "Controls the execution of the 'npm run test' script"
    required: false
    default: "true"
  npm-ci-parameter:
    description: "disallow external scripts during npm ci https://about.gitlab.com/blog/pipeline-security-lessons-from-march-supply-chain-incidents/#use-case-2-detect-dependency-tampering-and-lockfile-manipulation"
    required: false
    default: "--ignore-scripts=true"

outputs:
  artifact-name:
    description: "Name of the artifact upload"
    value: ${{steps.artifact-name.outputs.artifact-name}}
  cyclone-artifact-id:
    description: "ID of the sbom artifact"
    value: ${{steps.upload-sbom-artifact.outputs.artifact-id}}
  cyclone-path:
    value: ${{steps.artifact-name.outputs.cyclone-path}}
    description: "path of the sbom"
runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{inputs.app-path}}/package.json
        cache: "npm"
        cache-dependency-path: "./${{inputs.app-path}}/package-lock.json"
    - name: Install dependencies
      env:
        APP_PATH: ${{inputs.app-path}}
        NPM_CI_PARAMETER: ${{ inputs.npm-ci-parameter }}
      run: npm --prefix ./$APP_PATH ci $NPM_CI_PARAMETER
      shell: bash
    - name: Run lint
      env:
        APP_PATH: ${{inputs.app-path}}
      if: ${{ inputs.run-lint == 'true' }}
      run: npm run --prefix  ./$APP_PATH lint
      shell: bash
    - name: Run test
      env:
        APP_PATH: ${{inputs.app-path}}
      if: ${{ inputs.run-test == 'true' }}
      run: npm run  --prefix ./$APP_PATH test
      shell: bash
    - name: Run build
      env:
        APP_PATH: ${{inputs.app-path}}
      run: npm run  --prefix ./$APP_PATH build
      shell: bash
    - id: artifact-name
      name: Sets output variable $GITHUB_OUTPUT
      env:
        APP_PATH: ${{inputs.app-path}}
      run: |
        echo "artifact-name=${{hashFiles(format('./{0}/package.json', inputs.app-path))}}" >> "$GITHUB_OUTPUT"
        echo "cyclone-path=$APP_PATH/dist/application.cdx.json" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{steps.artifact-name.outputs.artifact-name}}
        path: "**/dist"
        retention-days: 5
    - id: upload-sbom-artifact
      name: upload-sbom-artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: "${{inputs.app-path}}/dist/application.cdx.json"
        retention-days: 5
        archive: false
