name: "Maven build"
description: "Executes a Maven build and uploads the generated artifact to Maven Central"

inputs:
  java-version:
    description: "Java version to use for the build"
    required: false
  java-version-file:
    description: "The path to a file containing java version."
    default: "pom.xml"
    required: false
  app-path:
    description: "Path to the project’s pom.xml file"
    required: true
outputs:
  artifact-name:
    description: "Name of the artifact upload"
    value: ${{steps.artifact-name.outputs.artifact-name}}
  cyclone-artifact-id:
    description: "ID of the sbom artifact"
    value: ${{steps.upload-sbom-artifact.outputs.artifact-id}}
  cyclone-path:
    description: "path of the sbom"
    value: ${{steps.artifact-name.outputs.cyclone-path}}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Extract Java Version from pom.xml
      id: get-java-version
      shell: bash
      env:
        APP_PATH: ${{inputs.app-path}}
      run: |
        # Check if the input java-version is empty
        if [ -z "${{ inputs.java-version }}" ]; then
            # Extract from pom.xml if input is empty
            VERSION=$(grep -oP '(?<=<(java.version)>)[^<]+' "$APP_PATH/pom.xml" | head -n 1)
        else
            # Use the provided input
            VERSION="${{ inputs.java-version }}"
        fi
        
        # Fail the build if no version could be determined at all
        if [ -z "$VERSION" ]; then
            echo "Error: Java version could not be determined!"
            exit 1
        fi
        
        # Save the version to step outputs
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          

    - name: Set up JDK
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version:  ${{ steps.get-java-version.outputs.version }}
        distribution: "temurin"
        cache: "maven"
        cache-dependency-path: "./${{inputs.app-path}}/pom.xml"
    - name: Build with Maven
      env:
        APP_PATH: ${{inputs.app-path}}
      run: mvn --update-snapshots -f ./$APP_PATH/pom.xml install
      shell: bash
    - id: artifact-name
      name: Set output variable $GITHUB_OUTPUT
      env:
        APP_PATH: ${{inputs.app-path}}
      run: |
        echo "artifact-name=${{hashFiles(format('./{0}/pom.xml', inputs.app-path))}}" >> "$GITHUB_OUTPUT"
        echo "cyclone-path=$APP_PATH/target/classes/META-INF/sbom/application.cdx.json" >> "$GITHUB_OUTPUT"
      shell: bash
    - id: upload-artifact
      name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{steps.artifact-name.outputs.artifact-name}}
        path: "**/target"
        retention-days: 5
    - id: upload-sbom-artifact
      name: upload-sbom-artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{inputs.app-path}}
        path: "${{inputs.app-path}}/target/classes/META-INF/sbom/application.cdx.json"
        retention-days: 5
        archive: false
