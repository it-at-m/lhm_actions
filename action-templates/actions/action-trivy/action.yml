name: "Trivy Dependency Scan"
description: "Run a Trivy filesystem scan of the repository"

inputs:
  trivyignore-files:
    description: "Path(s) to .trivyignore file(s) to ignore known CVEs (comma- or newline-separated)"
    required: false
    default: ".trivyignore"
  timeout:
    description: "timeout for trivy scan"
    required: false
    default: 15m0s

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        fetch-depth: 0 # Required for vitepress lastUpdated
        persist-credentials: false
    - name: Run Trivy vulnerability scanner in repository mode
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: "fs"
        scan-ref: "."
        format: "json"
        exit-code: "1"
        timeout: "${{ inputs.timeout }}"
        trivyignores: ${{ inputs.trivyignore-files }}
        output: trivy-report.json
    - name: convert
      if: ${{ always() && hashFiles('trivy-report.json') != '' }}
      shell: bash
      run: |
        trivy convert --format table --output trivy-results.txt  trivy-report.json
        cat trivy-results.txt
        trivy convert --format sarif --output trivy-results.sarif  trivy-report.json

    - name: Upload Vulnerability Scan Results
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      if: always()
      with:
        name: trivy-report
        path: trivy-report.json
        retention-days: 7

    - name: Upload Trivy scan results to GitHub Security tab
      if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: "trivy-results.sarif"
